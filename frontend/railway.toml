# Railway config for the FRONTEND service.
#
# Configure in Railway with Root Directory = frontend so this file is picked up
# and the build context is just the frontend tree, not the whole repo.
#
# The frontend reads NEXT_PUBLIC_API_URL at build time. Set it to the backend
# service's public URL + /api/v1 (e.g. https://mece-backend-production.up.railway.app/api/v1).
# The variable is baked into the JS bundle, so changing it requires a redeploy.

[build]
builder = "NIXPACKS"
buildCommand = "npm ci && npm run build"

[deploy]
startCommand = "npm run start -- --hostname 0.0.0.0 --port $PORT"
healthcheckPath = "/v2"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
