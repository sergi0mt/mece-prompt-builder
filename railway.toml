# Railway config for the BACKEND service of MECE Prompt Builder.
#
# Deployment plan:
#   1. Create two services in the same Railway project, both linked to this repo.
#   2. Backend service → Root Directory: /  (uses this file)
#   3. Frontend service → Root Directory: /frontend  (uses frontend/railway.toml)
#   4. On the backend service, attach a Volume mounted at /data.
#   5. Set env vars on the backend service:
#        OPENROUTER_API_KEY, BRAVE_API_KEY (optional), TAVILY_API_KEY (optional)
#   6. On the frontend service, set NEXT_PUBLIC_API_URL to the backend public URL + /api/v1.

[build]
builder = "NIXPACKS"
buildCommand = "pip install --upgrade pip && pip install -r backend/requirements.txt"

[deploy]
startCommand = "uvicorn backend.main:app --host 0.0.0.0 --port $PORT --timeout-keep-alive 120"
healthcheckPath = "/api/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
